<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f1629;
      color: #f1f5f9;
      width: 340px;
      min-height: 200px;
    }
    .header {
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 {
      font-size: 1rem;
      font-weight: 700;
      color: white;
    }
    .header img { width: 24px; height: 24px; border-radius: 4px; }

    .body { padding: 16px 20px; }

    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 0.85rem;
      outline: none;
      font-family: inherit;
    }
    .form-group input:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 2px rgba(124,58,237,0.2);
    }
    .form-group input::placeholder { color: #475569; }

    .url-display {
      font-size: 0.78rem;
      color: #a78bfa;
      word-break: break-all;
      padding: 8px 12px;
      background: rgba(124,58,237,0.1);
      border-radius: 8px;
      line-height: 1.4;
      max-height: 60px;
      overflow: hidden;
    }

    .row { display: flex; gap: 8px; }
    .row .form-group { flex: 1; }

    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-save {
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: white;
      margin-top: 4px;
    }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124,58,237,0.3); }
    .btn-save:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .status {
      text-align: center;
      padding: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      display: none;
    }
    .status.success { display: block; color: #10b981; }
    .status.error { display: block; color: #ef4444; }

    .settings {
      padding: 8px 20px 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .settings label {
      font-size: 0.72rem;
      color: #64748b;
    }
    .settings input {
      width: 100%;
      padding: 6px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: #94a3b8;
      font-size: 0.78rem;
      font-family: monospace;
      outline: none;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    <h1>JobPilot — Save Job</h1>
  </div>

  <div class="body" id="formView">
    <div class="form-group">
      <label>Page URL</label>
      <div class="url-display" id="pageUrl">Loading...</div>
    </div>
    <div class="form-group">
      <label>Job Title</label>
      <input type="text" id="jobTitle" placeholder="Auto-detected or type manually">
    </div>
    <div class="row">
      <div class="form-group">
        <label>Company</label>
        <input type="text" id="jobCompany" placeholder="Company name">
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="jobLocation" placeholder="Location">
      </div>
    </div>
    <button class="btn btn-save" id="saveBtn">🚀 Save to JobPilot</button>
    <div class="status" id="status"></div>
  </div>

  <div class="settings">
    <label>Server URL</label>
    <input type="text" id="serverUrl" value="http://localhost:3000">
  </div>

  <script src="popup.js"></script>
</body>
</html>
